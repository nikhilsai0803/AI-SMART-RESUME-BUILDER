{% extends "base.html" %}
{% block title %}Recruiter Login — Smart Resume AI{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="glass-card auth-card">
    <div class="auth-icon"><i class="fas fa-user-tie"></i></div>
    <h2>Recruiter Portal</h2>
    <p class="dim">Sign in to screen and rank candidates</p>
    <form method="POST" action="{{ url_for('rec_login') }}">
      <div class="fg">
        <label>Email / Username</label>
        <input type="text" name="email" class="finput" placeholder="admin" required autocomplete="username"/>
      </div>
      <div class="fg">
        <label>Password</label>
        <input type="password" name="password" class="finput" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <button class="glow-btn w100" type="submit">
        <i class="fas fa-sign-in-alt"></i> <span>Sign In</span>
      </button>
    </form>
    <p class="auth-hint dim">Default: <code>admin</code> / <code>password</code> — set via env vars in production.</p>
    <a href="{{ url_for('index') }}" class="back-link"><i class="fas fa-arrow-left"></i> Back to Candidate Side</a>
  </div>
</div>
{% endblock %}
